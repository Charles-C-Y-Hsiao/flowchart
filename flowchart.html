<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-chubby/css/uicons-regular-chubby.css">
  <title>資料流 × DOM × API — Flow Editor</title>
  <style>
    :root{
      color-scheme: light;
      --bg:#f4f7fb;
      --panel:#ffffff;
      --card:#ffffff;
      --card2:#f7f9fc;
      --text:#172033;
      --muted:#69758a;
      --line:#d9e2ef;
      --accent:#2f7ee6;
      --accent-deep:#1759b7;
      --danger:#bf4a4a;
      --ok:#27885c;
      --shadow: 0 10px 24px rgba(23,32,51,.08);
      --radius: 6px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; font-family: Calibri, "Segoe UI", "Noto Sans TC", Arial, sans-serif; color:var(--text); background: var(--bg); }
    .app{ width:100%; max-width:100vw; height:100%; display:grid; grid-template-rows:auto 1fr; overflow:hidden; }
    header{
      display:flex; align-items:center; justify-content:space-between; gap:18px;
      width:100%; max-width:100vw; min-width:0;
      padding:14px 20px; background: var(--panel);
      border-bottom:1px solid var(--line);
      position: sticky; top:0; z-index:10;
      overflow:visible;
      box-shadow: 0 8px 24px rgba(23,32,51,.06);
    }
    header .title{
      position:relative;
      display:flex;
      flex-direction:column;
      gap:4px;
      align-items:flex-start;
      flex:0 0 auto;
      min-width:280px;
    }
    header .title h1{ display:inline-block; font-size:16px; margin:0; letter-spacing:.3px; }
    header .title .sub{ color:var(--muted); font-size:12px; }
    .project-tool{
      position:relative;
      width:var(--project-tool-width, 100%);
      flex:0 0 auto;
      min-width:0;
    }
    .account-tool{
      position:relative;
      width:var(--project-tool-width, 100%);
      flex:0 0 auto;
      min-width:0;
    }
    .project-trigger{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:5px;
      padding:3px 0 0;
      background:transparent;
      border:0;
      border-radius:0;
      color:var(--muted);
    }
    .account-trigger{
      align-items:center;
      justify-content:flex-start;
      padding-top:0;
      color:var(--text);
      font-size:12px;
      font-weight:700;
      line-height:1.2;
    }
    .account-mark{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:12px;
      height:12px;
      flex:0 0 12px;
      color:var(--accent-deep);
      line-height:1;
    }
    .account-mark .fi{
      display:block;
      font-size:15px;
      line-height:1;
      transform:translateY(1px);
    }
    .project-trigger:hover,
    .project-tool.open .project-trigger,
    .account-tool.open .project-trigger{
      background:transparent;
      color:var(--accent-deep);
    }
    .project-trigger-text{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      text-align:left;
    }
    .project-panel{
      position:absolute;
      left:0;
      top:calc(100% + 8px);
      width:320px;
      max-width:calc(100vw - 32px);
      display:none;
      grid-template-columns:1fr;
      gap:8px;
      padding:10px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:rgba(255,255,255,.97);
      box-shadow:var(--shadow);
      z-index:45;
    }
    .project-tool.open .project-panel,
    .account-tool.open .project-panel{ display:grid; }
    .project-search{
      width:100%;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:#f8fafc;
      color:var(--text);
      padding:8px 10px;
      font-size:12px;
      outline:none;
    }
    .project-search:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 2px rgba(47,126,230,.14);
      background:#ffffff;
    }
    .project-list{
      display:grid;
      gap:4px;
      max-height:240px;
      overflow:auto;
    }
    .project-option{
      width:100%;
      display:grid;
      grid-template-columns:1fr auto;
      gap:4px 10px;
      align-items:center;
      padding:8px 10px;
      border:1px solid transparent;
      background:transparent;
      color:var(--text);
      text-align:left;
      white-space:normal;
    }
    .project-option:hover,
    .project-option.active{
      background:#f4f9ff;
      border-color:#c9d8eb;
      color:var(--accent-deep);
    }
    .project-option-name{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-weight:700;
      font-size:12px;
    }
    .project-option-meta{
      grid-column:1 / -1;
      color:var(--muted);
      font-size:11px;
    }
    .project-option-badge{
      color:var(--ok);
      font-size:11px;
    }
    .project-empty{
      padding:10px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }
    .project-create{
      display:grid;
      grid-template-columns:1fr auto;
      gap:8px;
      padding-top:8px;
      border-top:1px solid var(--line);
    }
    .project-create-input{
      min-width:0;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:#f8fafc;
      color:var(--text);
      padding:8px 10px;
      font-size:12px;
      outline:none;
    }
    .project-create-input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 2px rgba(47,126,230,.14);
      background:#ffffff;
    }
    .project-create-button{
      padding:8px 10px;
    }
    .toolbar{
      position:relative;
      flex:1 1 0;
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-end;
      min-width:0;
      overflow:visible;
    }
    .toolbar-row{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      width:100%;
      max-width:100%;
      overflow:hidden;
    }
    .toolbar-actions{ flex-wrap:nowrap; }
    .toolbar-hints{ flex-wrap:nowrap; }
    .toolbar-more{
      position:absolute;
      right:0;
      top:calc(100% + 8px);
      width:320px;
      max-width:calc(100vw - 32px);
      display:none;
      grid-template-columns:1fr;
      gap:8px;
      padding:10px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:rgba(255,255,255,.96);
      box-shadow:var(--shadow);
      z-index:40;
    }
    .toolbar.open .toolbar-more{ display:grid; }
    .toolbar-more .pill{
      width:100%;
      text-align:left;
    }
    .toolbar-more-section{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
    }
    .toolbar-more-section:empty{ display:none; }
    .toolbar-more .overflow-item{
      width:100%;
      text-align:left;
      justify-content:flex-start;
    }
    button, .pill{
      border:1px solid var(--line);
      background: #ffffff;
      color:var(--text);
      padding:8px 10px;
      border-radius: var(--radius);
      font-size:12px;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      flex:0 0 auto;
      transition: transform .06s ease, background .12s ease, border-color .12s ease;
    }
    button:hover{ background: #f4f9ff; border-color: #9fc5f4; color: var(--accent-deep); }
    button:active{ transform: translateY(1px); }
    button.primary{ background: #f4f9ff; border-color: #9fc5f4; color: var(--accent-deep); }
    button.danger{ background: #fff7f7; border-color: #efb5b5; color: var(--danger); }
    button.ok{ background: #f2fbf6; border-color: #a9dcc2; color: var(--ok); }
    button.help-toggle{ min-width:84px; }
    button.icon-button{
      width:42px;
      height:42px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0;
      font-size:21px;
      line-height:1;
    }
    button.icon-button .fi{
      display:block;
      line-height:1;
      transform:translateY(2px);
    }
    .pill{ cursor:default; }
    .pill kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:11px;
      padding:2px 6px;
      border:1px solid var(--line);
      border-radius:4px;
      margin:0 4px;
      background: #f1f5f9;
    }

    .stage{
      position:relative;
      overflow:hidden;
    }
    /* 背景格線 */
    .grid{
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(157,166,179,.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(157,166,179,.18) 1px, transparent 1px);
      background-size: 34px 34px;
      opacity:.75;
      pointer-events:none;
      transform: translateZ(0);
    }

    /* 可縮放/平移的 viewport */
    .viewport{
      position:absolute; inset:0;
      transform-origin: 0 0;
      z-index:2;
      pointer-events:none;
    }

    /* SVG 線層 */
    svg#edges{
      position:absolute; inset:0;
      width:100%;
      height:100%;
      overflow:visible;
      pointer-events:none;
      z-index:3;
    }
    .edge{
      stroke: rgba(47,126,230,.74);
      stroke-width: 1.55;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 1px 1px rgba(23,32,51,.1));
    }
    .edge-hit{
      stroke: transparent;
      stroke-width: 28;
      fill: none;
      pointer-events: stroke;
      cursor: pointer;
    }
    .edge.selected{
      stroke: var(--accent-deep);
      stroke-width: 1.5px;
    }
    .edge-edit-guide{
      stroke: rgba(47,126,230,.24);
      stroke-width: 1.2;
      stroke-dasharray: 5 4;
      fill: none;
      pointer-events: none;
    }
    .edge-edit-halo{
      stroke: rgba(47,126,230,.28);
      stroke-width: 10;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .edge.preview{
      stroke: rgba(47,126,230,.74);
      stroke-dasharray: 5 4;
      opacity:.78;
    }
    .edge-grip{
      fill:var(--accent);
      stroke:#ffffff;
      stroke-width:2.5;
      cursor:move;
      pointer-events:auto;
      opacity:1;
      filter: drop-shadow(0 2px 4px rgba(23,32,51,.24));
      transition: opacity .14s ease, fill .14s ease;
    }
    .edge-grip:hover{
      opacity:1;
      fill: var(--accent-deep);
    }
    .edge-grip-x{ cursor: ew-resize; }
    .edge-grip-y{ cursor: ns-resize; }
    .edge-end-grip{
      fill:#ffffff;
      stroke:var(--accent);
      stroke-width:2.5;
      cursor:crosshair;
      pointer-events:auto;
      filter: drop-shadow(0 2px 4px rgba(23,32,51,.22));
      transform-box: fill-box;
      transform-origin: center;
      transition: fill .14s ease, stroke .14s ease;
    }
    .edge-end-grip:hover{
      fill:#eef6ff;
      stroke:var(--accent-deep);
    }
    .edge-end-grip-to{
      fill:var(--accent);
      stroke:#ffffff;
    }
    .stage.reconnecting .connector-point{
      opacity:1;
      pointer-events:auto;
    }
    marker#arrowHead path,
    marker#arrowHeadSelected path{
      fill:none;
      stroke: context-stroke;
      stroke-width:1.45;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    /* 節點 */
    .node{
      position:absolute;
      pointer-events:auto;
      width: 260px;
      min-height: 72px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px 12px 9px;
      cursor: default;
      user-select:none;
    }
    .node.selected{
      outline: 2px solid rgba(47,126,230,.45);
      outline-offset: 2px;
      border-color: #9fc5f4;
    }
    .stage.moving .node.selected{
      outline-color: rgba(47,126,230,.8);
      box-shadow: 0 12px 26px rgba(47,126,230,.18), var(--shadow);
    }
    .stage.moving .node.selected .node-move-handle{ cursor:grabbing; }
    .selection-marquee{
      position:absolute;
      border:1px solid rgba(47,126,230,.82);
      background: rgba(47,126,230,.12);
      box-shadow: 0 0 0 1px rgba(255,255,255,.48) inset;
      border-radius:4px;
      pointer-events:none;
      display:none;
      z-index:6;
    }
    .node .tagrow{
      display:flex; gap:4px 6px; flex-wrap:wrap; margin-bottom:5px; align-items:center;
      padding-right:32px;
      min-height:20px;
    }
    .node.move-ready{
      border-color:#9fc5f4;
      box-shadow:0 10px 24px rgba(47,126,230,.14), var(--shadow);
    }
    .tag{
      font-size:11px;
      line-height:1.15;
      padding:2px 7px;
      border-radius: 999px;
      border:1px solid var(--line);
      background: #f7f9fc;
      color: var(--muted);
    }
    .tag[contenteditable="true"]{
      cursor:text;
      min-width:30px;
      user-select:text;
      outline:none;
    }
    .tag[contenteditable="true"]:focus{
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(47,126,230,.14);
      background:#ffffff;
    }
    .tag.core{ color:#8a6510; border-color: #ead68f; background: #fff8dc; }
    .tag.dom{ color:#1759b7; border-color: #b9d7f8; background: #eef6ff; }
    .tag.api{ color:#27885c; border-color: #a9dcc2; background: #f2fbf6; }
    .tag.risk{ color:#bf4a4a; border-color: #efb5b5; background: #fff7f7; }
    .tag-select{
      border:1px solid var(--line);
      border-radius:999px;
      background:#ffffff;
      color:var(--muted);
      font-size:11px;
      height:20px;
      padding:0 6px;
      cursor:pointer;
      outline:none;
      display:none;
    }
    .node.controls-open .tag-select,
    .node.selected .tag-select{ display:inline-block; }
    .tag-select:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 2px rgba(47,126,230,.14);
    }

    .node .title{
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .2px;
      line-height: 1.2;
      margin-bottom: 3px;
    }
    .node .body{
      font-size: 12px;
      color: var(--muted);
      line-height: 1.28;
      white-space: pre-wrap;
    }
    /* 可編輯 */
    .node [contenteditable="true"]{
      user-select:text;
      cursor:text;
      outline:none;
    }
    .node .title[contenteditable="true"]{ color: var(--text); }
    .node .body[contenteditable="true"]{ color: var(--muted); }

    /* resize handle */
    .resize{
      position:absolute; right:8px; bottom:8px;
      width:14px; height:14px;
      border-right:2px solid rgba(105,117,138,.45);
      border-bottom:2px solid rgba(105,117,138,.45);
      border-radius: 2px;
      cursor: nwse-resize;
      opacity:.75;
    }
    .node.selected .resize{ border-color: var(--accent); }

    .connector-point{
      position:absolute;
      width:7px;
      height:7px;
      padding:0;
      border:1px solid rgba(47,126,230,.45);
      border-radius:999px;
      background: rgba(255,255,255,.72);
      box-shadow: 0 1px 2px rgba(23,32,51,.1);
      z-index:3;
      cursor: crosshair;
      opacity:0;
      pointer-events:none;
      transform: translate(-50%, -50%);
      transition: opacity .12s ease, transform .12s ease, background .12s ease, border-color .12s ease;
    }
    .node.show-connectors .connector-point,
    .node:hover .connector-point,
    .stage.reconnecting .connector-point,
    .connector-point.active{
      opacity:1;
      pointer-events:auto;
    }
    .connector-point:hover,
    .connector-point.active{
      background: var(--accent);
      border-color: #fff;
      box-shadow: 0 0 0 4px rgba(47,126,230,.18);
      transform: translate(-50%, -50%) scale(1.45);
    }

    /* 層級欄（可選） */
    .lane{
      position:absolute;
      top: 16px;
      width: 240px;
      border: 1px dashed #b9c6d8;
      background: rgba(255,255,255,.78);
      border-radius: var(--radius);
      padding: 10px 10px 12px;
      color: var(--text);
      font-size: 12px;
      box-shadow: var(--shadow);
    }
    .lane h3{
      margin:0 0 8px;
      font-size: 12px;
      letter-spacing:.3px;
      color: var(--text);
    }
    .lane p{ margin:0; color: var(--muted); font-size: 11px; line-height:1.4; }
    .lane .hint{ margin-top:8px; font-size:11px; color: var(--muted); }
    .lane .hint kbd{ font-size:10px; }

    .flow-nav{
      position:absolute;
      left:16px;
      top:16px;
      z-index:8;
      display:flex;
      align-items:center;
      gap:8px;
      max-width:calc(100% - 32px);
      padding:7px 9px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:rgba(255,255,255,.9);
      box-shadow:0 8px 18px rgba(23,32,51,.06);
      backdrop-filter:blur(10px);
    }
    .flow-nav-path{
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      color:var(--muted);
      font-size:12px;
    }
    .flow-nav-path strong{
      color:var(--text);
      font-weight:700;
    }
    .flow-back{
      display:none;
      padding:5px 8px;
    }
    .flow-nav.can-back .flow-back{ display:inline-flex; }
    .node-move-handle{
      position:absolute;
      right:10px;
      top:10px;
      z-index:5;
      width:24px;
      height:22px;
      display:grid;
      place-items:center;
      padding:0;
      border-color:#c9d8eb;
      background:#f8fbff;
      color:var(--accent-deep);
      cursor:grab;
    }
    .node-move-handle:hover,
    .node-move-handle:focus{
      background:#eef6ff;
      border-color:#9fc5f4;
      box-shadow:0 0 0 2px rgba(47,126,230,.14);
    }
    .node-move-handle:active{
      cursor:grabbing;
    }
    .node-move-icon{
      width:13px;
      height:13px;
      display:block;
      background-image:radial-gradient(currentColor 1.4px, transparent 1.5px);
      background-size:6px 6px;
      background-position:0 0;
      opacity:.92;
    }
    .node-subflow{
      margin-left:0;
      padding:2px 7px;
      border-radius:999px;
      border-color:#c9d8eb;
      background:#f8fbff;
      color:var(--accent-deep);
      font-size:11px;
      line-height:1.2;
      display:none;
    }
    .node.controls-open .node-subflow,
    .node.selected .node-subflow{
      display:inline-flex;
      width:max-content;
    }
    .node-subflow.has-subflow{
      display:inline-flex;
      width:max-content;
      background:#f2fbf6;
      border-color:#a9dcc2;
      color:var(--ok);
    }

    /* 右側匯入匯出面板 */
    .drawer{
      position:absolute;
      top: 70px;
      right: 16px;
      width: 360px;
      max-width: calc(100% - 32px);
      background: rgba(255,255,255,.94);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px;
      display:none;
      z-index: 20;
      backdrop-filter: blur(10px);
    }
    .drawer.open{ display:block; }
    .drawer .row{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .drawer .row .muted{ color:var(--muted); font-size:12px; }
    .prompt-drawer{
      width:640px;
      max-height:calc(100% - 96px);
      overflow:auto;
    }
    .prompt-drawer .prompt-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding-bottom:10px;
      border-bottom:1px solid var(--line);
    }
    .prompt-drawer h2{
      margin:0;
      font-size:18px;
      line-height:1.25;
    }
    .prompt-drawer .prompt-subtitle{
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
    }
    .prompt-field{
      display:grid;
      gap:6px;
      margin-top:12px;
    }
    .prompt-field label{
      color:var(--muted);
      font-size:12px;
    }
    .prompt-input{
      min-height:92px;
      margin-top:0;
      font-family:inherit;
      font-size:13px;
      line-height:1.5;
    }
    .prompt-output{
      min-height:280px;
      margin-top:0;
    }
    .prompt-actions{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      margin-top:10px;
    }
    textarea{
      width:100%;
      min-height: 240px;
      margin-top:10px;
      background: #f8fafc;
      border:1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      padding: 10px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      outline:none;
    }
    .toast{
      position:absolute;
      left:50%;
      bottom:18px;
      transform: translateX(-50%);
      background: #ffffff;
      border:1px solid var(--line);
      padding: 10px 14px;
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
      display:none;
      z-index: 30;
      backdrop-filter: blur(10px);
    }
    .toast.show{ display:block; }
    .confirm-overlay{
      position:absolute;
      inset:0;
      z-index:60;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(23,32,51,.22);
      backdrop-filter:blur(3px);
    }
    .confirm-overlay.open{ display:flex; }
    .confirm-dialog{
      width:360px;
      max-width:100%;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:#ffffff;
      box-shadow:0 18px 42px rgba(23,32,51,.18);
      padding:16px;
    }
    .confirm-dialog h2{
      margin:0 0 6px;
      font-size:16px;
      line-height:1.3;
    }
    .confirm-dialog p{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }
    .confirm-id{
      display:block;
      margin:12px 0 0;
      padding:10px 12px;
      border:1px solid #c9d8eb;
      border-radius:var(--radius);
      background:#f8fbff;
      color:var(--accent-deep);
      font-weight:700;
      font-size:14px;
      letter-spacing:.5px;
    }
    .confirm-actions{
      display:flex;
      justify-content:flex-end;
      gap:8px;
      margin-top:14px;
    }
    .move-hint{
      position:absolute;
      left:0;
      top:0;
      display:none;
      z-index:35;
      transform:translate(12px, 12px);
      pointer-events:none;
      padding:7px 10px;
      border:1px solid #9fc5f4;
      border-radius:var(--radius);
      background:rgba(244,249,255,.96);
      color:var(--accent-deep);
      font-size:12px;
      font-weight:700;
      box-shadow:0 8px 18px rgba(23,32,51,.1);
      backdrop-filter:blur(10px);
      white-space:nowrap;
    }
    .move-hint.show{ display:block; }

    .mini{ font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">
      <h1>資料流 × DOM × API — Flow Editor</h1>
      <div class="account-tool" id="accountTool">
        <button class="project-trigger account-trigger" id="accountTrigger" type="button" aria-expanded="false" aria-haspopup="listbox" title="Switch user">
          <span class="account-mark" aria-hidden="true"><i class="fi fi-rc-user-pen"></i></span>
          <span class="project-trigger-text" id="accountCurrent">Hi, 000666888</span>
        </button>
        <div class="project-panel" id="accountPanel">
          <input class="project-search" id="accountSearch" type="search" placeholder="搜尋使用者" autocomplete="off" />
          <div class="project-list" id="accountList" role="listbox" aria-label="Flow users"></div>
          <div class="project-create">
            <input class="project-create-input" id="accountCreateName" type="text" placeholder="新增使用者 ID" inputmode="numeric" pattern="[1-9]{8}" maxlength="8" autocomplete="off" />
            <button class="project-create-button primary" id="btnCreateUser" type="button">新增</button>
          </div>
        </div>
      </div>
      <div class="project-tool" id="projectTool">
        <button class="project-trigger" id="projectTrigger" type="button" aria-expanded="false" aria-haspopup="listbox">
          <span class="project-trigger-text" id="projectCurrent">flowchart</span>
        </button>
        <div class="project-panel" id="projectPanel">
          <input class="project-search" id="projectSearch" type="search" placeholder="搜尋 flow 專案" autocomplete="off" />
          <div class="project-list" id="projectList" role="listbox" aria-label="Flow projects"></div>
          <div class="project-create">
            <input class="project-create-input" id="projectCreateName" type="text" placeholder="新增專案名稱" autocomplete="off" />
            <button class="project-create-button primary" id="btnCreateProject" type="button">新增</button>
          </div>
        </div>
      </div>
    </div>
    <div class="toolbar" id="toolbar">
      <div class="toolbar-row toolbar-actions">
        <button class="primary" id="btnAdd" data-overflow-row="actions" data-overflow-priority="1">＋ 新增文字框</button>
        <button id="btnAddLane" data-overflow-row="actions" data-overflow-priority="4">＋ 加上四層標籤區</button>
        <button class="danger" id="btnDelete" data-overflow-row="actions" data-overflow-priority="2">刪除選取</button>
        <button class="ok" id="btnIO" data-overflow-row="actions" data-overflow-priority="3">匯入 / 匯出</button>
        <button class="icon-button" id="btnPromptGuide" type="button" title="產生抽取題詞" aria-label="產生抽取題詞" data-overflow-row="actions" data-overflow-priority="3.5">
          <i class="fi fi-rc-book-user" aria-hidden="true"></i>
        </button>
      </div>
      <div class="toolbar-row toolbar-hints">
        <span class="pill" data-overflow-row="hints" data-overflow-priority="1">連線：按住 <kbd>Shift</kbd> 從框拖到另一框</span>
        <span class="pill" data-overflow-row="hints" data-overflow-priority="2">框選：空白處拖曳，可一次移動多個框</span>
        <span class="pill" data-overflow-row="hints" data-overflow-priority="3">多選：按住 <kbd>Ctrl</kbd> 點選多個框</span>
        <button class="help-toggle" id="btnHelpToggle" aria-expanded="false">更多說明</button>
      </div>
      <div class="toolbar-more" id="toolbarMore" aria-label="更多操作說明">
        <div class="toolbar-more-section" id="toolbarOverflow"></div>
        <div class="toolbar-more-section">
          <span class="pill">平移：按住 <kbd>Space</kbd> 拖曳工作區</span>
          <span class="pill">縮放：<kbd>Ctrl</kbd> + 滾輪</span>
          <span class="pill">編輯：Double click 文字後輸入</span>
          <span class="pill">大小：拖曳框右下角調整尺寸</span>
          <span class="pill">刪除：選取後按 <kbd>Delete</kbd></span>
        </div>
      </div>
    </div>
  </header>

  <div class="stage" id="stage">
    <div class="grid"></div>
    <div class="flow-nav" id="flowNav">
      <button class="flow-back" id="btnFlowBack" type="button">上層</button>
      <div class="flow-nav-path" id="flowBreadcrumb"></div>
    </div>

    <!-- 可選：層級提示欄（按「加上四層標籤區」才顯示） -->
    <div id="lanes"></div>

    <!-- SVG 線層 -->
    <svg id="edges">
      <defs>
        <marker id="arrowHead" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
          <path d="M 2.5 1.4 L 9 4 L 2.5 6.6"></path>
        </marker>
        <marker id="arrowHeadSelected" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
          <path d="M 2.5 1.4 L 9 4 L 2.5 6.6"></path>
        </marker>
      </defs>
    </svg>

    <!-- viewport：所有 nodes 會在這裡（可縮放/平移） -->
    <div class="viewport" id="viewport"></div>
    <div class="selection-marquee" id="selectionMarquee"></div>

    <!-- Import/Export Drawer -->
    <div class="drawer" id="drawer">
      <div class="row">
        <div class="muted">JSON（含節點與連線）</div>
        <div style="display:flex; gap:8px;">
          <button id="btnSaveFile" class="ok">Save JSON</button>
          <button id="btnMermaid">Mermaid</button>
          <button id="btnCopy">複製</button>
          <button id="btnApply" class="ok">套用匯入</button>
          <button id="btnClose">關閉</button>
        </div>
      </div>
      <textarea id="ioArea" spellcheck="false"></textarea>
      <div class="mini">提示：你可以把 JSON 貼到 Git、md 檔或當作備份。</div>
    </div>

    <div class="drawer prompt-drawer" id="promptDrawer">
      <div class="prompt-header">
        <div>
          <h2>抽取功能題詞</h2>
          <div class="prompt-subtitle">輸入要抽出的功能，產生可交給其他 Codex 專案的 JSON 匯入題詞。</div>
        </div>
        <button id="btnPromptClose" type="button">Close</button>
      </div>
      <div class="prompt-field">
        <label for="promptFeatureInput">要抽出的功能</label>
        <textarea class="prompt-input" id="promptFeatureInput" spellcheck="false" placeholder="例如：登入流程、付款模組、GPT Extract、排程拖曳功能"></textarea>
      </div>
      <div class="prompt-field">
        <label for="promptOutput">完整題詞</label>
        <textarea class="prompt-output" id="promptOutput" spellcheck="false" readonly></textarea>
      </div>
      <div class="prompt-actions">
        <button id="btnPromptRefresh" type="button">更新</button>
        <button class="ok" id="btnPromptCopy" type="button">Copy</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="confirm-overlay" id="userConfirmOverlay" role="dialog" aria-modal="true" aria-labelledby="userConfirmTitle">
      <div class="confirm-dialog">
        <h2 id="userConfirmTitle">確認新增使用者</h2>
        <p id="userConfirmMessage">請確認要新增並切換到這個使用者 ID。</p>
        <span class="confirm-id" id="userConfirmId"></span>
        <div class="confirm-actions">
          <button id="btnUserConfirmCancel" type="button">取消</button>
          <button class="ok" id="btnUserConfirmOk" type="button">確定</button>
        </div>
      </div>
    </div>
    <div class="move-hint" id="moveHint"></div>
  </div>
</div>

<script>
(async () => {
  const stage = document.getElementById('stage');
  const viewport = document.getElementById('viewport');
  const svg = document.getElementById('edges');
  const lanesWrap = document.getElementById('lanes');
  const selectionMarquee = document.getElementById('selectionMarquee');
  const flowNav = document.getElementById('flowNav');
  const btnFlowBack = document.getElementById('btnFlowBack');
  const flowBreadcrumb = document.getElementById('flowBreadcrumb');
  const toolbar = document.getElementById('toolbar');
  const toolbarActions = toolbar.querySelector('.toolbar-actions');
  const toolbarHints = toolbar.querySelector('.toolbar-hints');
  const toolbarOverflow = document.getElementById('toolbarOverflow');
  const accountTool = document.getElementById('accountTool');
  const accountTrigger = document.getElementById('accountTrigger');
  const accountCurrent = document.getElementById('accountCurrent');
  const accountSearch = document.getElementById('accountSearch');
  const accountList = document.getElementById('accountList');
  const accountCreateName = document.getElementById('accountCreateName');
  const btnCreateUser = document.getElementById('btnCreateUser');
  const projectTool = document.getElementById('projectTool');
  const projectTitle = document.querySelector('header .title h1');
  const projectTrigger = document.getElementById('projectTrigger');
  const projectCurrent = document.getElementById('projectCurrent');
  const projectSearch = document.getElementById('projectSearch');
  const projectList = document.getElementById('projectList');
  const projectCreateName = document.getElementById('projectCreateName');
  const btnCreateProject = document.getElementById('btnCreateProject');

  const btnAdd = document.getElementById('btnAdd');
  const btnAddLane = document.getElementById('btnAddLane');
  const btnDelete = document.getElementById('btnDelete');
  const btnIO = document.getElementById('btnIO');
  const btnPromptGuide = document.getElementById('btnPromptGuide');
  const btnHelpToggle = document.getElementById('btnHelpToggle');

  const drawer = document.getElementById('drawer');
  const ioArea = document.getElementById('ioArea');
  const btnCopy = document.getElementById('btnCopy');
  const btnSaveFile = document.getElementById('btnSaveFile');
  const btnMermaid = document.getElementById('btnMermaid');
  const btnApply = document.getElementById('btnApply');
  const btnClose = document.getElementById('btnClose');
  const promptDrawer = document.getElementById('promptDrawer');
  const promptFeatureInput = document.getElementById('promptFeatureInput');
  const promptOutput = document.getElementById('promptOutput');
  const btnPromptClose = document.getElementById('btnPromptClose');
  const btnPromptRefresh = document.getElementById('btnPromptRefresh');
  const btnPromptCopy = document.getElementById('btnPromptCopy');

  const toast = document.getElementById('toast');
  const userConfirmOverlay = document.getElementById('userConfirmOverlay');
  const userConfirmMessage = document.getElementById('userConfirmMessage');
  const userConfirmId = document.getElementById('userConfirmId');
  const btnUserConfirmCancel = document.getElementById('btnUserConfirmCancel');
  const btnUserConfirmOk = document.getElementById('btnUserConfirmOk');
  const moveHint = document.getElementById('moveHint');
  const CONNECTOR_POINT_SPACING = 30; // px: change this to adjust the point interval on each node edge.
  const CONNECTOR_CLEARANCE = 28; // px: distance a connector leaves a box before turning.
  const TAG_PRESETS = ['CORE', 'DOM', 'API', 'RISK'];
  const STORAGE_KEY = 'flow-editor-state-v2';
  const CURRENT_PROJECT_KEY = 'flow-editor-current-project';
  const CURRENT_USER_KEY = 'flow-editor-current-user';
  const USER_LIST_KEY = 'flow-editor-users';
  const API_BASE = '';
  const DEFAULT_USER = { id: '000666888', name: '000666888' };
  const DEFAULT_PROJECT = { id: 'flowchart', name: 'flowchart' };
  let currentUser = { ...DEFAULT_USER };
  let users = [{ ...DEFAULT_USER }];
  let currentProject = { ...DEFAULT_PROJECT };
  let projects = [{ ...DEFAULT_PROJECT }];
  let isBooting = true;
  let saveTimer = null;
  let toolbarLayoutTimer = null;
  const toolbarRows = {
    actions: toolbarActions,
    hints: toolbarHints
  };
  const toolbarOverflowItems = [...toolbar.querySelectorAll('[data-overflow-row]')].map((el, index) => ({
    el,
    index,
    row: el.dataset.overflowRow,
    priority: Number(el.dataset.overflowPriority || 0)
  }));

  // ─────────────────────────────────────────────────────────────
  // State
  // ─────────────────────────────────────────────────────────────
  const state = {
    flows: new Map([['main', { id: 'main', name: '主流程', parentFlowId: null, ownerNodeId: null }]]),
    currentFlowId: 'main',
    nodes: new Map(),   // id -> {id,x,y,w,h,tags,title,body}
    edges: new Map(),   // id -> {id,from,to}
    selected: { kind: null, id: null }, // {kind:'node'|'edge', id}
    selectedNodeIds: new Set(),
    hoverEdge: null,
    draftEdge: null, // {from, x2, y2} while connecting
    pendingPort: null, // {nodeId, port} after clicking the first connector point
    connectFrom: null, // nodeId when Shift drag starts
    drag: null, // {ids, origins, edgeOrigins, startX, startY}
    marquee: null, // {startClient, currentClient, startWorld, currentWorld, baseIds, moved}
    connectorDrag: null, // {id, axis} or {id, endpoint:'from'|'to'}
    resize: null, // {id, startW, startH, startX, startY}
    view: { x: 0, y: 0, scale: 1 }, // viewport transform
    panning: null // {startX,startY, ox, oy}
  };

  // ─────────────────────────────────────────────────────────────
  // Helpers
  // ─────────────────────────────────────────────────────────────
  const uid = (p='n') => p + Math.random().toString(36).slice(2, 9);

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1400);
  }

  function confirmUserCreation(userId){
    userConfirmMessage.textContent = '請確認要新增並切換到這個使用者 ID。';
    userConfirmId.textContent = userId;
    userConfirmOverlay.classList.add('open');
    btnUserConfirmOk.focus();

    return new Promise(resolve => {
      const done = confirmed => {
        userConfirmOverlay.classList.remove('open');
        btnUserConfirmOk.removeEventListener('click', onOk);
        btnUserConfirmCancel.removeEventListener('click', onCancel);
        userConfirmOverlay.removeEventListener('click', onOverlay);
        document.removeEventListener('keydown', onKeydown);
        resolve(confirmed);
      };
      const onOk = () => done(true);
      const onCancel = () => done(false);
      const onOverlay = event => {
        if (event.target === userConfirmOverlay) done(false);
      };
      const onKeydown = event => {
        if (event.key === 'Escape') done(false);
      };
      btnUserConfirmOk.addEventListener('click', onOk);
      btnUserConfirmCancel.addEventListener('click', onCancel);
      userConfirmOverlay.addEventListener('click', onOverlay);
      document.addEventListener('keydown', onKeydown);
    });
  }

  function positionMoveHint(clientX, clientY){
    const rect = stage.getBoundingClientRect();
    const x = Math.min(Math.max(clientX - rect.left, 8), rect.width - 160);
    const y = Math.min(Math.max(clientY - rect.top, 8), rect.height - 44);
    moveHint.style.left = x + 'px';
    moveHint.style.top = y + 'px';
  }

  function showMoveHint(clientX, clientY, count = 1){
    moveHint.textContent = count > 1 ? `拖曳移動 ${count} 個節點` : '拖曳移動節點';
    positionMoveHint(clientX, clientY);
    moveHint.classList.add('show');
    stage.classList.add('moving');
  }

  function updateMoveHint(clientX, clientY, moved = false){
    if (!moveHint.classList.contains('show')) return;
    if (moved) moveHint.textContent = '移動中';
    positionMoveHint(clientX, clientY);
  }

  function hideMoveHint(){
    moveHint.classList.remove('show');
    stage.classList.remove('moving');
  }

  function setHelpPanel(open){
    toolbar.classList.toggle('open', open);
    btnHelpToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  function closeHelpPanel(){
    setHelpPanel(false);
  }

  function userSlug(value){
    const slug = String(value || '')
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9_-]+/g, '-')
      .replace(/^-+|-+$/g, '');
    return slug || DEFAULT_USER.id;
  }

  function normalizeUser(value){
    const id = userSlug(typeof value === 'string' ? value : value?.id || value?.name);
    return { id, name: typeof value === 'object' && value?.name ? String(value.name) : id };
  }

  function loadLocalUsers(){
    try{
      const parsed = JSON.parse(window.localStorage.getItem(USER_LIST_KEY) || '[]');
      const normalized = Array.isArray(parsed) ? parsed.map(normalizeUser) : [];
      const byId = new Map([[DEFAULT_USER.id, { ...DEFAULT_USER }]]);
      normalized.forEach(user => byId.set(user.id, user));
      users = [...byId.values()];
    }catch{
      users = [{ ...DEFAULT_USER }];
    }
    const preferred = userSlug(window.localStorage.getItem(CURRENT_USER_KEY) || DEFAULT_USER.id);
    currentUser = users.find(user => user.id === preferred) || users[0] || { ...DEFAULT_USER };
  }

  function saveLocalUsers(){
    window.localStorage.setItem(USER_LIST_KEY, JSON.stringify(users));
    window.localStorage.setItem(CURRENT_USER_KEY, currentUser.id);
  }

  function projectStorageKey(projectId = currentProject.id){
    return `${STORAGE_KEY}:${currentUser.id}:${projectId || 'flowchart'}`;
  }

  function currentProjectKey(){
    return `${CURRENT_PROJECT_KEY}:${currentUser.id}`;
  }

  function projectSlug(value){
    const slug = String(value || '')
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9_-]+/g, '-')
      .replace(/^-+|-+$/g, '');
    return slug || `flow-${new Date().toISOString().slice(0, 10)}`;
  }

  function uniqueProjectSlug(name){
    const base = projectSlug(name);
    const used = new Set(projects.map(project => project.id));
    if (!used.has(base)) return base;
    let index = 2;
    while (used.has(`${base}-${index}`)) index += 1;
    return `${base}-${index}`;
  }

  function syncProjectToolWidth(){
    const width = Math.ceil(projectTitle.getBoundingClientRect().width);
    if (width > 0) {
      projectTool.style.setProperty('--project-tool-width', `${width}px`);
      accountTool.style.setProperty('--project-tool-width', `${width}px`);
    }
  }

  function setProjectMenu(open){
    syncProjectToolWidth();
    if (open) setAccountMenu(false);
    projectTool.classList.toggle('open', open);
    projectTrigger.setAttribute('aria-expanded', open ? 'true' : 'false');
    if (open) {
      projectSearch.focus();
      projectSearch.select();
    }
  }

  function setAccountMenu(open){
    syncProjectToolWidth();
    if (open) setProjectMenu(false);
    accountTool.classList.toggle('open', open);
    accountTrigger.setAttribute('aria-expanded', open ? 'true' : 'false');
    if (open) {
      accountSearch.focus();
      accountSearch.select();
    }
  }

  function updateProjectLabel(){
    projectCurrent.textContent = currentProject.name || currentProject.id || 'flowchart';
  }

  function updateAccountLabel(){
    accountCurrent.textContent = `Hi, ${currentUser.name || currentUser.id}`;
  }

  function rootFlow(){
    if (!state.flows.has('main')){
      state.flows.set('main', { id: 'main', name: '主流程', parentFlowId: null, ownerNodeId: null });
    }
    return state.flows.get('main');
  }

  function currentFlow(){
    return state.flows.get(state.currentFlowId) || rootFlow();
  }

  function nodeFlowId(node){
    return node.flowId || 'main';
  }

  function edgeFlowId(edge){
    return edge.flowId || 'main';
  }

  function currentNodes(){
    return [...state.nodes.values()].filter(node => nodeFlowId(node) === state.currentFlowId);
  }

  function currentEdges(){
    return [...state.edges.values()].filter(edge => edgeFlowId(edge) === state.currentFlowId);
  }

  function flowPath(flowId = state.currentFlowId){
    const path = [];
    let flow = state.flows.get(flowId) || rootFlow();
    const seen = new Set();
    while (flow && !seen.has(flow.id)){
      seen.add(flow.id);
      path.unshift(flow);
      flow = flow.parentFlowId ? state.flows.get(flow.parentFlowId) : null;
    }
    return path;
  }

  function updateFlowNav(){
    const path = flowPath();
    flowBreadcrumb.innerHTML = path
      .map((flow, index) => index === path.length - 1
        ? `<strong>${escapeHtml(flow.name || flow.id)}</strong>`
        : escapeHtml(flow.name || flow.id))
      .join(' / ');
    flowNav.classList.toggle('can-back', state.currentFlowId !== 'main');
  }

  function escapeHtml(value){
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function clearRenderedFlow(){
    viewport.innerHTML = '';
    svg.querySelectorAll('path.edge, path.edge-hit, .edge-grip, .edge-end-grip, .edge-edit-guide, .edge-edit-halo').forEach(el => el.remove());
  }

  function renderCurrentFlow(){
    clearRenderedFlow();
    clearSelection();
    currentNodes().forEach(node => renderNode(node));
    normalizeAllEdges();
    redrawEdges();
    updateFlowNav();
  }

  function setCurrentFlow(flowId){
    if (!state.flows.has(flowId)) return;
    hideMoveHint();
    state.currentFlowId = flowId;
    state.pendingPort = null;
    state.connectFrom = null;
    state.draftEdge = null;
    renderCurrentFlow();
    saveState();
  }

  function ensureNodeSubflow(nodeId){
    const node = state.nodes.get(nodeId);
    if (!node) return null;
    if (node.subflowId && state.flows.has(node.subflowId)) return node.subflowId;
    const flowId = `flow_${nodeId}`;
    node.subflowId = flowId;
    state.flows.set(flowId, {
      id: flowId,
      name: node.title || node.id,
      parentFlowId: node.flowId || 'main',
      ownerNodeId: node.id
    });
    return flowId;
  }

  function descendantFlowIds(flowId, result = new Set()){
    if (!flowId || result.has(flowId)) return result;
    result.add(flowId);
    state.flows.forEach(flow => {
      if (flow.parentFlowId === flowId) descendantFlowIds(flow.id, result);
    });
    return result;
  }

  function deleteFlows(flowIds){
    flowIds.forEach(flowId => {
      if (flowId === 'main') return;
      state.flows.delete(flowId);
    });
    for (const [nodeId, node] of [...state.nodes.entries()]){
      if (flowIds.has(nodeFlowId(node))) state.nodes.delete(nodeId);
    }
    for (const [edgeId, edge] of [...state.edges.entries()]){
      if (flowIds.has(edgeFlowId(edge))) state.edges.delete(edgeId);
    }
  }

  function restoreToolbarItems(){
    ['actions', 'hints'].forEach(rowName => {
      toolbarOverflowItems
        .filter(item => item.row === rowName)
        .sort((a, b) => a.index - b.index)
        .forEach(item => {
          item.el.classList.remove('overflow-item');
          if (rowName === 'hints') {
            toolbarRows[rowName].insertBefore(item.el, btnHelpToggle);
          } else {
            toolbarRows[rowName].appendChild(item.el);
          }
        });
    });
    toolbarOverflowItems.forEach(item => item.el.classList.remove('overflow-item'));
    toolbarOverflow.innerHTML = '';
  }

  function moveToolbarItemToOverflow(item, overflowed){
    item.el.classList.add('overflow-item');
    overflowed.push(item);
    toolbarOverflow.appendChild(item.el);
  }

  function toolbarRowContentWidth(row){
    const children = [...row.children].filter(el => getComputedStyle(el).display !== 'none');
    const gap = Number.parseFloat(getComputedStyle(row).columnGap || getComputedStyle(row).gap || 0) || 0;
    return children.reduce((total, el) => total + el.getBoundingClientRect().width, 0) +
      Math.max(0, children.length - 1) * gap;
  }

  function fitToolbarRow(rowName, overflowed){
    const row = toolbarRows[rowName];
    const candidates = toolbarOverflowItems
      .filter(item => item.row === rowName && item.el.parentElement === row)
      .sort((a, b) => b.priority - a.priority || b.index - a.index);

    while (toolbarRowContentWidth(row) > row.clientWidth + 1 && candidates.length){
      moveToolbarItemToOverflow(candidates.shift(), overflowed);
    }
  }

  function layoutToolbarOverflow(){
    restoreToolbarItems();
    const overflowed = [];
    fitToolbarRow('actions', overflowed);
    fitToolbarRow('hints', overflowed);
    overflowed.sort((a, b) => a.index - b.index).forEach(item => toolbarOverflow.appendChild(item.el));
    btnHelpToggle.classList.toggle('primary', overflowed.length > 0);
  }

  function scheduleToolbarLayout(){
    clearTimeout(toolbarLayoutTimer);
    toolbarLayoutTimer = setTimeout(layoutToolbarOverflow, 0);
  }

  function setViewportTransform(){
    const {x,y,scale} = state.view;
    viewport.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    // 線層也跟著同步（用 viewBox 的方式會更複雜，這裡用同樣 transform）
    svg.style.transformOrigin = '0 0';
    svg.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    redrawEdges();
  }

  function toWorld(clientX, clientY){
    const rect = stage.getBoundingClientRect();
    const sx = clientX - rect.left;
    const sy = clientY - rect.top;
    const {x,y,scale} = state.view;
    return { x: (sx - x)/scale, y: (sy - y)/scale };
  }

  function nodeCenter(n){
    return { x: n.x + n.w/2, y: n.y + n.h/2 };
  }

  function getConnectorPoints(n){
    const spacing = CONNECTOR_POINT_SPACING;
    const sides = [
      { side: 'top', length: n.w },
      { side: 'right', length: n.h },
      { side: 'bottom', length: n.w },
      { side: 'left', length: n.h },
    ];
    const points = [];

    sides.forEach(({ side, length }) => {
      const offsets = [];
      for (let offset = spacing; offset < length; offset += spacing){
        offsets.push(offset);
      }
      if (!offsets.length) offsets.push(length / 2);

      offsets.forEach((offset, index) => {
        const point = { side, offset: Math.round(offset), index };
        if (side === 'top') Object.assign(point, { x: offset, y: 0 });
        if (side === 'right') Object.assign(point, { x: n.w, y: offset });
        if (side === 'bottom') Object.assign(point, { x: offset, y: n.h });
        if (side === 'left') Object.assign(point, { x: 0, y: offset });
        points.push(point);
      });
    });

    return points;
  }

  function getPortPosition(n, port, fallbackSide){
    if (!port){
      if (fallbackSide === 'right') return { x: n.x + n.w, y: n.y + n.h / 2 };
      if (fallbackSide === 'left') return { x: n.x, y: n.y + n.h / 2 };
      return nodeCenter(n);
    }

    const maxOffset = (port.side === 'top' || port.side === 'bottom') ? n.w : n.h;
    const offset = Math.min(Math.max(port.offset ?? maxOffset / 2, 0), maxOffset);
    if (port.side === 'top') return { x: n.x + offset, y: n.y };
    if (port.side === 'right') return { x: n.x + n.w, y: n.y + offset };
    if (port.side === 'bottom') return { x: n.x + offset, y: n.y + n.h };
    if (port.side === 'left') return { x: n.x, y: n.y + offset };
    return nodeCenter(n);
  }

  function getPortDirection(port, fallbackSide){
    const side = port?.side || fallbackSide || 'right';
    if (side === 'top') return { x: 0, y: -1 };
    if (side === 'right') return { x: 1, y: 0 };
    if (side === 'bottom') return { x: 0, y: 1 };
    if (side === 'left') return { x: -1, y: 0 };
    return { x: 1, y: 0 };
  }

  function portKey(nodeId, port){
    return `${nodeId}:${port.side}:${port.offset}`;
  }

  function makePort(side, offset){
    return { side, offset };
  }

  function portFromConnectorElement(point){
    if (!point) return null;
    const side = point.dataset.side;
    const offset = Number(point.dataset.offset);
    if (!side || Number.isNaN(offset)) return null;
    return makePort(side, offset);
  }

  function nearestPortForPoint(node, point){
    const distances = [
      { side: 'top', distance: Math.abs(point.y - node.y), offset: point.x - node.x, max: node.w },
      { side: 'right', distance: Math.abs(point.x - (node.x + node.w)), offset: point.y - node.y, max: node.h },
      { side: 'bottom', distance: Math.abs(point.y - (node.y + node.h)), offset: point.x - node.x, max: node.w },
      { side: 'left', distance: Math.abs(point.x - node.x), offset: point.y - node.y, max: node.h }
    ].sort((a, b) => a.distance - b.distance);
    const nearest = distances[0];
    const offset = Math.round(Math.min(Math.max(nearest.offset, 0), nearest.max));
    return makePort(nearest.side, offset);
  }

  function reconnectTargetFromEvent(ev){
    const target = document.elementFromPoint(ev.clientX, ev.clientY);
    if (!target || !target.closest) return null;

    const connector = target.closest('.connector-point');
    if (connector){
      return {
        nodeId: connector.dataset.nodeId,
        port: portFromConnectorElement(connector)
      };
    }

    const nodeEl = target.closest('.node');
    if (!nodeEl) return null;
    const node = state.nodes.get(nodeEl.dataset.id);
    if (!node) return null;
    return {
      nodeId: node.id,
      port: nearestPortForPoint(node, toWorld(ev.clientX, ev.clientY))
    };
  }

  function defaultEdgePorts(from, to){
    const fromCenter = nodeCenter(from);
    const toCenter = nodeCenter(to);
    const dx = toCenter.x - fromCenter.x;
    const dy = toCenter.y - fromCenter.y;

    if (Math.abs(dx) >= Math.abs(dy)){
      return dx >= 0
        ? { fromPort: makePort('right', Math.round(from.h / 2)), toPort: makePort('left', Math.round(to.h / 2)) }
        : { fromPort: makePort('left', Math.round(from.h / 2)), toPort: makePort('right', Math.round(to.h / 2)) };
    }

    return dy >= 0
      ? { fromPort: makePort('bottom', Math.round(from.w / 2)), toPort: makePort('top', Math.round(to.w / 2)) }
      : { fromPort: makePort('top', Math.round(from.w / 2)), toPort: makePort('bottom', Math.round(to.w / 2)) };
  }

  function setActiveConnectorPoint(){
    viewport.querySelectorAll('.connector-point').forEach(point => {
      const active = state.pendingPort &&
        point.dataset.nodeId === state.pendingPort.nodeId &&
        point.dataset.side === state.pendingPort.port.side &&
        Number(point.dataset.offset) === state.pendingPort.port.offset;
      point.classList.toggle('active', !!active);
    });
  }

  function syncNodeHeightFromDom(id){
    const n = state.nodes.get(id);
    const el = viewport.querySelector(`.node[data-id="${id}"]`);
    if (!n || !el) return false;

    const measuredHeight = Math.ceil(el.getBoundingClientRect().height / state.view.scale);
    if (measuredHeight > n.h){
      n.h = measuredHeight;
      return true;
    }
    return false;
  }

  function measureNodeContentHeight(id, width){
    const el = viewport.querySelector(`.node[data-id="${id}"]`);
    if (!el) return 60;

    const prevWidth = el.style.width;
    const prevMinHeight = el.style.minHeight;
    el.style.width = width + 'px';
    el.style.minHeight = '0px';
    const height = Math.ceil(el.getBoundingClientRect().height / state.view.scale);
    el.style.width = prevWidth;
    el.style.minHeight = prevMinHeight;
    return height;
  }

  function updateSelectionUI(){
    viewport.querySelectorAll('.node').forEach(el => {
      const selected = state.selectedNodeIds.has(el.dataset.id);
      el.classList.toggle('selected', selected);
      el.classList.toggle('controls-open', selected);
    });
