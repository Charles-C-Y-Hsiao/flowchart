  function selectNodes(ids){
    const nextIds = ids.filter(id => state.nodes.has(id));
    state.selectedNodeIds = new Set(nextIds);
    state.selected = nextIds.length ? { kind: 'node', id: nextIds[0] } : { kind: null, id: null };
    updateSelectionUI();
  }

  function addNodeToSelection(id){
    if (!state.nodes.has(id)) return;
    const ids = state.selectedNodeIds.has(id)
      ? [...state.selectedNodeIds]
      : [...state.selectedNodeIds, id];
    state.selectedNodeIds = new Set(ids);
    state.selected = { kind: 'node', id };
    updateSelectionUI();
  }

  function select(kind, id){
    state.selected = { kind, id };
    state.selectedNodeIds.clear();
    if (kind === 'node' && id) state.selectedNodeIds.add(id);
    updateSelectionUI();
  }

  function clearSelection(){
    select(null, null);
    redrawEdges();
  }

  function isEdgeUiTarget(target){
    return !!(target && target.closest && target.closest('.edge-hit, .edge-grip, .edge-end-grip, .edge, .edge-edit-guide, .edge-edit-halo'));
  }

  function normalizeRect(a, b){
    return {
      left: Math.min(a.x, b.x),
      top: Math.min(a.y, b.y),
      right: Math.max(a.x, b.x),
      bottom: Math.max(a.y, b.y)
    };
  }

  function rectsIntersect(a, b){
    return a.left <= b.right && a.right >= b.left && a.top <= b.bottom && a.bottom >= b.top;
  }

  function updateMarqueeBox(){
    if (!state.marquee) return;
    const stageRect = stage.getBoundingClientRect();
    const screenRect = normalizeRect(
      { x: state.marquee.startClient.x - stageRect.left, y: state.marquee.startClient.y - stageRect.top },
      { x: state.marquee.currentClient.x - stageRect.left, y: state.marquee.currentClient.y - stageRect.top }
    );
    selectionMarquee.style.left = screenRect.left + 'px';
    selectionMarquee.style.top = screenRect.top + 'px';
    selectionMarquee.style.width = Math.max(1, screenRect.right - screenRect.left) + 'px';
    selectionMarquee.style.height = Math.max(1, screenRect.bottom - screenRect.top) + 'px';
    selectionMarquee.style.display = 'block';
  }

  function updateMarqueeSelection(){
    if (!state.marquee) return;
    const worldRect = normalizeRect(state.marquee.startWorld, state.marquee.currentWorld);
    const ids = [...(state.marquee.baseIds || [])];
    for (const n of currentNodes()){
      const nodeRect = { left: n.x, top: n.y, right: n.x + n.w, bottom: n.y + n.h };
      if (rectsIntersect(worldRect, nodeRect)) ids.push(n.id);
    }
    selectNodes(ids);
  }

  function stopMarquee(){
    if (!state.marquee) return false;
    const moved = state.marquee.moved;
    state.marquee = null;
    selectionMarquee.style.display = 'none';
    return moved;
  }

  function shortenPoint(point, toward, radius){
    const dx = toward.x - point.x;
    const dy = toward.y - point.y;
    const length = Math.max(1, Math.hypot(dx, dy));
    const amount = Math.min(radius, length / 2);
    return {
      x: point.x + (dx / length) * amount,
      y: point.y + (dy / length) * amount
    };
  }

  function compactConnectorPoints(points){
    const threshold = 6;
    return points.filter((point, index) => {
      if (index === 0) return true;
      const prev = points[index - 1];
      return Math.abs(point.x - prev.x) > threshold || Math.abs(point.y - prev.y) > threshold;
    });
  }

  function roundedOrthogonalPath(points, radius){
    const [first, ...rest] = points;
    let d = `M ${first.x} ${first.y}`;

    rest.forEach((point, index) => {
      const prev = points[index];
      const next = points[index + 2];
      if (!next){
        d += ` L ${point.x} ${point.y}`;
        return;
      }

      const before = shortenPoint(point, prev, radius);
      const after = shortenPoint(point, next, radius);
      d += ` L ${before.x} ${before.y} Q ${point.x} ${point.y} ${after.x} ${after.y}`;
    });

    return d;
  }

  function defaultConnectorElbow(startExit, endExit){
    return {
      x: (startExit.x + endExit.x) / 2,
      y: (startExit.y + endExit.y) / 2
    };
  }

  function clampElbowOutsideNode(elbow, node, port, pad = CONNECTOR_CLEARANCE){
    if (!port) return elbow;
    const next = { ...elbow };
    if (port.side === 'top'){
      next.y = Math.min(next.y, node.y - pad);
    } else if (port.side === 'bottom'){
      next.y = Math.max(next.y, node.y + node.h + pad);
    } else if (port.side === 'left'){
      next.x = Math.min(next.x, node.x - pad);
    } else if (port.side === 'right'){
      next.x = Math.max(next.x, node.x + node.w + pad);
    }
    return next;
  }

  function repairEdgeElbow(edge, from, to){
    const route = edgeRoutePoints(from, to, edge);
    let elbow = edge.elbow || route.elbow;
    elbow = clampElbowOutsideNode(elbow, from, edge.fromPort);
    elbow = clampElbowOutsideNode(elbow, to, edge.toPort);

    if (!edge.elbow || Math.abs(edge.elbow.x - elbow.x) > 0.1 || Math.abs(edge.elbow.y - elbow.y) > 0.1){
      edge.elbow = elbow;
    }
  }

  // Rounded orthogonal connector, matching the progress_v2 marker link style.
  function edgePath(start, end, fromDirection, toDirection, elbow){
    const startExit = {
      x: start.x + fromDirection.x * CONNECTOR_CLEARANCE,
      y: start.y + fromDirection.y * CONNECTOR_CLEARANCE
    };
    const endExit = {
      x: end.x + toDirection.x * CONNECTOR_CLEARANCE,
      y: end.y + toDirection.y * CONNECTOR_CLEARANCE
    };
    const resolvedElbow = elbow || defaultConnectorElbow(startExit, endExit);

    return roundedOrthogonalPath(compactConnectorPoints([
      start,
      startExit,
      { x: resolvedElbow.x, y: startExit.y },
      { x: resolvedElbow.x, y: resolvedElbow.y },
      { x: endExit.x, y: resolvedElbow.y },
      endExit,
      end
    ]), 8);
  }

  function edgeRoutePoints(from, to, e = {}){
    const start = getPortPosition(from, e.fromPort, 'right');
    const end = getPortPosition(to, e.toPort, 'left');
    const fromDirection = getPortDirection(e.fromPort, 'right');
    const toDirection = getPortDirection(e.toPort, 'left');
    const startExit = {
      x: start.x + fromDirection.x * CONNECTOR_CLEARANCE,
      y: start.y + fromDirection.y * CONNECTOR_CLEARANCE
    };
    const endExit = {
      x: end.x + toDirection.x * CONNECTOR_CLEARANCE,
      y: end.y + toDirection.y * CONNECTOR_CLEARANCE
    };
    return {
      start,
      end,
      fromDirection,
      toDirection,
      elbow: e.elbow || defaultConnectorElbow(startExit, endExit)
    };
  }

  function normalizeEdge(edge){
    const from = state.nodes.get(edge.from);
    const to = state.nodes.get(edge.to);
    if (!from || !to) return edge;

    if (!edge.fromPort || !edge.toPort){
      const defaults = defaultEdgePorts(from, to);
      edge.fromPort = edge.fromPort || defaults.fromPort;
      edge.toPort = edge.toPort || defaults.toPort;
    }

    if (!edge.elbow){
      const route = edgeRoutePoints(from, to, edge);
      edge.elbow = route.elbow;
    }
    repairEdgeElbow(edge, from, to);

    return edge;
  }

  function normalizeAllEdges(){
    for (const edge of currentEdges()){
      normalizeEdge(edge);
    }
  }

  function startConnectorDrag(edgeId, axis, ev){
    ev.stopPropagation();
    if (ev.preventDefault) ev.preventDefault();
    select('edge', edgeId);
    if (axis === 'from' || axis === 'to'){
      state.connectorDrag = { id: edgeId, endpoint: axis };
      stage.classList.add('reconnecting');
      showToast(axis === 'from' ? 'Drag start point to reconnect' : 'Drag arrow point to reconnect');
      return;
    }
    state.connectorDrag = { id: edgeId, axis };
  }

  function finishEndpointReconnect(ev){
    const drag = state.connectorDrag;
    if (!drag || !drag.endpoint) return false;

    const edge = state.edges.get(drag.id);
    if (!edge) return false;

    const target = reconnectTargetFromEvent(ev);
    if (!target || !target.nodeId || !target.port){
      showToast('Drop on a node or connector point');
      redrawEdges();
      return false;
    }

    if (drag.endpoint === 'from'){
      if (target.nodeId === edge.to){
        showToast('Start and arrow cannot use the same node');
        redrawEdges();
        return false;
      }
      edge.from = target.nodeId;
      edge.fromPort = target.port;
    }else{
      if (target.nodeId === edge.from){
        showToast('Start and arrow cannot use the same node');
        redrawEdges();
        return false;
      }
      edge.to = target.nodeId;
      edge.toPort = target.port;
    }

    edge.elbow = null;
    normalizeEdge(edge);
    select('edge', edge.id);
    redrawEdges();
    showToast('Connection point updated');
    return true;
  }

  function selectEdgeForEdit(edgeId, ev){
    ev.stopPropagation();
    if (ev.preventDefault) ev.preventDefault();
    if (state.selected.kind === 'edge' && state.selected.id === edgeId) return;
    select('edge', edgeId);
    redrawEdges();
    showToast('已進入連線編輯：拖曳藍色控制點調整走線');
  }

  function updateConnectorDrag(ev){
    if (!state.connectorDrag) return false;
    const edge = state.edges.get(state.connectorDrag.id);
    if (!edge) return true;
    if (state.connectorDrag.endpoint){
      return true;
    }
    const from = state.nodes.get(edge.from);
    const to = state.nodes.get(edge.to);
    if (!from || !to) return true;

    const route = edgeRoutePoints(from, to, edge);
    const w = toWorld(ev.clientX, ev.clientY);
    edge.elbow = { ...route.elbow };
    if (state.connectorDrag.axis === 'x') edge.elbow.x = w.x;
    if (state.connectorDrag.axis === 'y') edge.elbow.y = w.y;
    redrawEdges();
    return true;
  }

  function redrawEdges(){
    // keep only edges existing + preview
    svg.querySelectorAll('path.edge:not(.preview)').forEach(p => p.remove());
    svg.querySelectorAll('path.edge-hit').forEach(p => p.remove());
    svg.querySelectorAll('.edge-edit-guide, .edge-edit-halo').forEach(g => g.remove());
    svg.querySelectorAll('.edge-grip, .edge-end-grip').forEach(g => g.remove());

    for (const e of currentEdges()){
      const from = state.nodes.get(e.from);
      const to   = state.nodes.get(e.to);
      if (!from || !to) continue;
      normalizeEdge(e);

      const route = edgeRoutePoints(from, to, e);

      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.classList.add('edge');
      if (state.selected.kind === 'edge' && state.selected.id === e.id) path.classList.add('selected');
      path.dataset.id = e.id;
      const d = edgePath(route.start, route.end, route.fromDirection, route.toDirection, route.elbow);
      path.setAttribute('d', d);
      path.setAttribute('marker-end', (state.selected.kind==='edge' && state.selected.id===e.id) ? 'url(#arrowHeadSelected)' : 'url(#arrowHead)');
      path.addEventListener('mousedown', (ev) => selectEdgeForEdit(e.id, ev));
      path.addEventListener('pointerdown', (ev) => selectEdgeForEdit(e.id, ev));
      path.addEventListener('click', (ev) => selectEdgeForEdit(e.id, ev));

      const hitPath = document.createElementNS('http://www.w3.org/2000/svg','path');
      hitPath.classList.add('edge-hit');
      hitPath.dataset.id = e.id;
      hitPath.setAttribute('d', d);
      hitPath.addEventListener('mouseenter', () => { state.hoverEdge = e.id; });
      hitPath.addEventListener('mouseleave', () => {
        if (state.hoverEdge === e.id) state.hoverEdge = null;
      });
      hitPath.addEventListener('click', (ev) => selectEdgeForEdit(e.id, ev));
      hitPath.addEventListener('mousedown', (ev) => {
        selectEdgeForEdit(e.id, ev);
        showToast('已選取連線，拖曳藍色控制點調整走線');
      });
      hitPath.addEventListener('pointerdown', (ev) => {
        selectEdgeForEdit(e.id, ev);
        showToast('已選取連線，拖曳藍色控制點調整走線');
      });

      if (state.selected.kind === 'edge' && state.selected.id === e.id){
        const halo = document.createElementNS('http://www.w3.org/2000/svg','path');
        halo.classList.add('edge-edit-halo');
        halo.setAttribute('d', d);
        svg.appendChild(halo);

        const guideV = document.createElementNS('http://www.w3.org/2000/svg','path');
        guideV.classList.add('edge-edit-guide');
        guideV.setAttribute('d', `M ${route.elbow.x} ${route.start.y} L ${route.elbow.x} ${route.end.y}`);
        svg.appendChild(guideV);

        const guideH = document.createElementNS('http://www.w3.org/2000/svg','path');
        guideH.classList.add('edge-edit-guide');
        guideH.setAttribute('d', `M ${route.start.x} ${route.elbow.y} L ${route.end.x} ${route.elbow.y}`);
        svg.appendChild(guideH);
      }

      svg.appendChild(path);
      svg.appendChild(hitPath);

      if (state.selected.kind === 'edge' && state.selected.id === e.id){
        [
          { endpoint: 'from', x: route.start.x, y: route.start.y },
          { endpoint: 'to', x: route.end.x, y: route.end.y }
        ].forEach(point => {
          const grip = document.createElementNS('http://www.w3.org/2000/svg','circle');
          grip.classList.add('edge-end-grip', `edge-end-grip-${point.endpoint}`);
          grip.dataset.id = e.id;
          grip.dataset.endpoint = point.endpoint;
          grip.setAttribute('cx', point.x);
          grip.setAttribute('cy', point.y);
          grip.setAttribute('r', point.endpoint === 'to' ? 7 : 6);
          grip.addEventListener('mousedown', (ev) => startConnectorDrag(e.id, point.endpoint, ev));
          grip.addEventListener('pointerdown', (ev) => startConnectorDrag(e.id, point.endpoint, ev));
          svg.appendChild(grip);
        });

        [
          { axis: 'x', x: route.elbow.x, y: (route.start.y + route.elbow.y) / 2 },
          { axis: 'y', x: (route.elbow.x + route.end.x) / 2, y: route.elbow.y }
        ].forEach(gripPoint => {
          const grip = document.createElementNS('http://www.w3.org/2000/svg','circle');
          grip.classList.add('edge-grip', `edge-grip-${gripPoint.axis}`);
          grip.dataset.id = e.id;
          grip.dataset.axis = gripPoint.axis;
          grip.setAttribute('cx', gripPoint.x);
          grip.setAttribute('cy', gripPoint.y);
          grip.setAttribute('r', 8);
          grip.addEventListener('mousedown', (ev) => startConnectorDrag(e.id, gripPoint.axis, ev));
          grip.addEventListener('pointerdown', (ev) => startConnectorDrag(e.id, gripPoint.axis, ev));
          svg.appendChild(grip);
        });
      }
    }

    // preview edge
    const preview = svg.querySelector('path.edge.preview');
    if (state.draftEdge){
      const from = state.nodes.get(state.draftEdge.from);
      if (!from) return;
      const a = getPortPosition(from, state.draftEdge.fromPort, 'right');
      const b = { x: state.draftEdge.x2, y: state.draftEdge.y2 };
      const fromDirection = getPortDirection(state.draftEdge.fromPort, 'right');
      const toDirection = { x: 0, y: 0 };
      if (!preview){
        const p = document.createElementNS('http://www.w3.org/2000/svg','path');
        p.classList.add('edge','preview');
        p.setAttribute('marker-end','url(#arrowHeadSelected)');
        svg.appendChild(p);
      }
      svg.querySelector('path.edge.preview').setAttribute('d', edgePath(a, b, fromDirection, toDirection));
    } else if (preview){
      preview.remove();
    }
  }

  function handleConnectorPointClick(nodeId, port, ev){
    ev.stopPropagation();
    ev.preventDefault();

    select('node', nodeId);

    if (!state.pendingPort){
      const fromNode = state.nodes.get(nodeId);
      const start = getPortPosition(fromNode, port, 'right');
      state.pendingPort = { nodeId, port };
      state.draftEdge = { mode: 'connector-point', from: nodeId, fromPort: port, x2: start.x, y2: start.y };
      setActiveConnectorPoint();
      redrawEdges();
      showToast('已選擇起點，請點另一個框的連線點');
      return;
    }

    const from = state.pendingPort;
    if (from.nodeId === nodeId && portKey(from.nodeId, from.port) === portKey(nodeId, port)){
      state.pendingPort = null;
      state.draftEdge = null;
      setActiveConnectorPoint();
      redrawEdges();
      showToast('已取消連線起點');
      return;
    }

    if (from.nodeId === nodeId){
      showToast('請選另一個文字框的連線點');
      return;
    }

    addEdge(from.nodeId, nodeId, from.port, port);
    state.pendingPort = null;
    state.draftEdge = null;
    setActiveConnectorPoint();
    redrawEdges();
    showToast('已建立連線');
  }

  function renderConnectorPoints(el, n){
    getConnectorPoints(n).forEach(port => {
      const point = document.createElement('button');
      point.type = 'button';
      point.className = 'connector-point';
      point.dataset.nodeId = n.id;
      point.dataset.side = port.side;
      point.dataset.offset = String(port.offset);
      point.title = `連線點 ${port.side} ${port.offset}px`;
      point.style.left = port.x + 'px';
      point.style.top = port.y + 'px';
      point.addEventListener('mousedown', ev => ev.stopPropagation());
      point.addEventListener('click', ev => handleConnectorPointClick(n.id, {
        side: port.side,
        offset: port.offset
      }, ev));
      el.appendChild(point);
    });
  }

  function normalizeTagText(text){
    const value = (text || '').replace(/\s+/g, ' ').trim();
    const preset = TAG_PRESETS.find(tag => tag.toLowerCase() === value.toLowerCase());
    return preset || value;
  }

  function tagClass(tag){
    const preset = TAG_PRESETS.find(item => item.toLowerCase() === String(tag).toLowerCase());
    return 'tag tag-edit' + (preset ? ' ' + preset.toLowerCase() : '');
  }

  function syncTagsFromRow(nodeId, tagrow, commit = false){
    const n = state.nodes.get(nodeId);
    if (!n) return;
    const tags = [];
    tagrow.querySelectorAll('.tag-edit').forEach(tagEl => {
      const tag = commit
        ? normalizeTagText(tagEl.textContent)
        : (tagEl.textContent || '').replace(/\s+/g, ' ').trim();
      if (!tag) {
        if (commit) tagEl.remove();
        return;
      }
      if (!tags.includes(tag)) tags.push(tag);
      if (commit) tagEl.textContent = tag;
      tagEl.className = tagClass(tag);
    });
    n.tags = tags;
    if (syncNodeHeightFromDom(nodeId)){
      refreshNodePosition(nodeId);
      redrawEdges();
    }
    saveState();
  }

  function focusTag(tagEl){
    tagEl.focus();
    const range = document.createRange();
    range.selectNodeContents(tagEl);
    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);
  }

  function createTagPill(nodeId, tag, tagrow){
    const tagEl = document.createElement('span');
    tagEl.className = tagClass(tag);
    tagEl.contentEditable = 'true';
    tagEl.spellcheck = false;
    tagEl.textContent = normalizeTagText(tag) || 'TAG';
    tagEl.title = 'Edit tag. Clear it to remove.';
    tagEl.addEventListener('mousedown', ev => ev.stopPropagation());
    tagEl.addEventListener('input', () => syncTagsFromRow(nodeId, tagrow));
    tagEl.addEventListener('blur', () => syncTagsFromRow(nodeId, tagrow, true));
    tagEl.addEventListener('keydown', ev => {
      if (ev.key === 'Enter'){
        ev.preventDefault();
        tagEl.blur();
      }
    });
    tagrow.insertBefore(tagEl, tagrow.querySelector('.tag-select'));
    return tagEl;
  }

  function renderTagEditor(tagrow, n){
    tagrow.addEventListener('mousedown', ev => ev.stopPropagation());
    (n.tags || []).forEach(tag => createTagPill(n.id, tag, tagrow));

    const select = document.createElement('select');
    select.className = 'tag-select';
    select.title = 'Add tag';
    select.innerHTML = '<option value="">+ tag</option>' +
      TAG_PRESETS.map(tag => `<option value="${tag}">${tag}</option>`).join('') +
      '<option value="__custom">Custom...</option>';
    select.addEventListener('mousedown', ev => ev.stopPropagation());
    select.addEventListener('change', () => {
      if (!select.value) return;
      const tag = select.value === '__custom' ? 'TAG' : select.value;
      const exists = (state.nodes.get(n.id)?.tags || []).some(item => item.toLowerCase() === tag.toLowerCase());
      let tagEl = [...tagrow.querySelectorAll('.tag-edit')].find(item => item.textContent.trim().toLowerCase() === tag.toLowerCase());
      if (!exists && !tagEl) tagEl = createTagPill(n.id, tag, tagrow);
      syncTagsFromRow(n.id, tagrow, true);
      select.value = '';
      if (select.value === '__custom' || tag === 'TAG') focusTag(tagEl);
    });
    tagrow.appendChild(select);
  }

  function beginNodeDrag(n, ev){
    if (ev.preventDefault) ev.preventDefault();
    ev.stopPropagation();

    if (ev.ctrlKey || ev.metaKey){
      addNodeToSelection(n.id);
    } else if (!state.selectedNodeIds.has(n.id)){
      select('node', n.id);
    }

    const dragIds = state.selectedNodeIds.has(n.id) ? [...state.selectedNodeIds] : [n.id];
    const dragIdSet = new Set(dragIds);
    state.drag = {
      ids: dragIds,
      origins: dragIds.map(id => {
        const node = state.nodes.get(id);
        return { id, x: node.x, y: node.y };
      }),
      edgeOrigins: currentEdges()
        .filter(edge => dragIdSet.has(edge.from) && dragIdSet.has(edge.to) && edge.elbow)
        .map(edge => ({ id: edge.id, x: edge.elbow.x, y: edge.elbow.y })),
      startX: ev.clientX,
      startY: ev.clientY
    };
    showMoveHint(ev.clientX, ev.clientY, dragIds.length);
  }

  function setNodeControlsOpen(el, open){
    el.classList.toggle('controls-open', open);
  }

  function renderNode(n){
    const el = document.createElement('div');
    el.className = 'node';
    el.dataset.id = n.id;
    el.style.left = n.x + 'px';
    el.style.top  = n.y + 'px';
    el.style.width = n.w + 'px';
    el.style.minHeight = n.h + 'px';

    const tagrow = document.createElement('div');
    tagrow.className = 'tagrow';
    renderTagEditor(tagrow, n);

    const moveHandle = document.createElement('button');
    moveHandle.type = 'button';
    moveHandle.className = 'node-move-handle';
    moveHandle.title = 'Move node';
    moveHandle.setAttribute('aria-label', 'Move node');
    moveHandle.innerHTML = '<span class="node-move-icon" aria-hidden="true"></span>';
    moveHandle.addEventListener('mouseenter', () => {
      el.classList.add('move-ready');
      setNodeControlsOpen(el, true);
    });
    moveHandle.addEventListener('mouseleave', () => {
      el.classList.remove('move-ready');
      if (!state.selectedNodeIds.has(n.id)) setNodeControlsOpen(el, false);
    });
    moveHandle.addEventListener('focus', () => setNodeControlsOpen(el, true));
    moveHandle.addEventListener('blur', () => {
      if (!state.selectedNodeIds.has(n.id)) setNodeControlsOpen(el, false);
    });
    moveHandle.addEventListener('mousedown', ev => beginNodeDrag(n, ev));

    const subflowButton = document.createElement('button');
    subflowButton.type = 'button';
    subflowButton.className = 'node-subflow' + (n.subflowId ? ' has-subflow' : '');
    subflowButton.textContent = n.subflowId ? 'Subflow' : '+ Subflow';
    subflowButton.title = n.subflowId ? 'Open subflow' : 'Create and open subflow';
    subflowButton.addEventListener('mousedown', ev => ev.stopPropagation());
    subflowButton.addEventListener('click', ev => {
      ev.preventDefault();
      ev.stopPropagation();
      const flowId = ensureNodeSubflow(n.id);
      if (!flowId) return;
      saveState();
      setCurrentFlow(flowId);
    });
    tagrow.appendChild(subflowButton);

    const title = document.createElement('div');
    title.className = 'title';
    title.contentEditable = "true";
    title.spellcheck = false;
    title.textContent = n.title || 'Untitled';

    const body = document.createElement('div');
    body.className = 'body';
    body.contentEditable = "true";
    body.spellcheck = false;
    body.textContent = n.body || '';

    const resize = document.createElement('div');
    resize.className = 'resize';
    resize.title = 'Resize';

    el.appendChild(tagrow);
    el.appendChild(moveHandle);
    el.appendChild(title);
    el.appendChild(body);
    renderConnectorPoints(el, n);
    el.appendChild(resize);

    el.addEventListener('mouseenter', () => {
      el.classList.add('show-connectors');
    });
    el.addEventListener('mouseleave', () => {
      el.classList.remove('show-connectors');
    });

    // update state on edit
    title.addEventListener('input', () => {
      const nn = state.nodes.get(n.id);
      if (nn) {
        nn.title = title.textContent;
        if (nn.subflowId && state.flows.has(nn.subflowId)){
          state.flows.get(nn.subflowId).name = nn.title || nn.subflowId;
          updateFlowNav();
        }
      }
      if (syncNodeHeightFromDom(n.id)){
        refreshNodePosition(n.id);
        redrawEdges();
      }
      saveState();
    });
    body.addEventListener('input', () => {
      const nn = state.nodes.get(n.id);
      if (nn) nn.body = body.textContent;
      if (syncNodeHeightFromDom(n.id)){
        refreshNodePosition(n.id);
        redrawEdges();
      }
      saveState();
    });

    resize.addEventListener('mousedown', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      select('node', n.id);
      state.resize = {
        id: n.id,
        startW: n.w, startH: n.h,
        startX: ev.clientX, startY: ev.clientY
      };
    });

    // select on click
    el.addEventListener('mousedown', (ev) => {
      ev.stopPropagation();

      // shift drag to connect
      if (ev.shiftKey){
        select('node', n.id);
        state.connectFrom = n.id;
        const w = toWorld(ev.clientX, ev.clientY);
        state.draftEdge = { mode: 'shift-drag', from: n.id, x2: w.x, y2: w.y };
        redrawEdges();
        return;
      }

      // ignore when editing text
      const target = ev.target;
      if (target && target.getAttribute && target.getAttribute('contenteditable') === 'true'){
        return;
      }

      return;
    });

    viewport.appendChild(el);
    if (syncNodeHeightFromDom(n.id)){
      refreshNodePosition(n.id);
    }
  }

  function refreshNodePosition(id){
    const n = state.nodes.get(id);
    const el = viewport.querySelector(`.node[data-id="${id}"]`);
    if (!n || !el) return;
    el.style.left = n.x + 'px';
    el.style.top  = n.y + 'px';
    el.style.width = n.w + 'px';
    el.style.minHeight = n.h + 'px';
    el.querySelectorAll('.connector-point').forEach(point => point.remove());
    renderConnectorPoints(el, n);
    setActiveConnectorPoint();
  }

  function addNode(partial = {}){
    const id = uid('n');
    const n = {
      id,
      x: partial.x ?? 80,
      y: partial.y ?? 80,
      w: partial.w ?? 280,
      h: partial.h ?? 86,
      tags: partial.tags ?? [],
      title: partial.title ?? 'New Box',
      body: partial.body ?? 'Double click / edit me.',
      flowId: partial.flowId || state.currentFlowId,
      subflowId: partial.subflowId || null
    };
    state.nodes.set(id, n);
    renderNode(n);
    redrawEdges();
    select('node', id);
    saveState();
    return id;
  }

  function addEdge(from, to, fromPort = null, toPort = null){
    if (!from || !to || from===to) return null;
    // prevent duplicates
    for (const e of currentEdges()){
      if (e.from !== from || e.to !== to) continue;
      if (fromPort || toPort){
        e.fromPort = fromPort || e.fromPort;
        e.toPort = toPort || e.toPort;
        normalizeEdge(e);
        redrawEdges();
        saveState();
      }
      return e.id;
    }
    const id = uid('e');
    const edge = { id, from, to, fromPort, toPort, flowId: state.currentFlowId };
    normalizeEdge(edge);
    state.edges.set(id, edge);
    select('edge', id);
    redrawEdges();
    saveState();
    return id;
  }

  function deleteSelected(){
    const {kind,id} = state.selected;
    if (!kind || !id) return;

    if (kind === 'node'){
      const ids = state.selectedNodeIds.size ? [...state.selectedNodeIds] : [id];
      ids.forEach(nodeId => {
        const node = state.nodes.get(nodeId);
        if (node?.subflowId) deleteFlows(descendantFlowIds(node.subflowId));
        state.nodes.delete(nodeId);
        const el = viewport.querySelector(`.node[data-id="${nodeId}"]`);
        if (el) el.remove();
      });
      for (const [eid,e] of [...state.edges.entries()]){
        if (edgeFlowId(e) !== state.currentFlowId) continue;
        if (ids.includes(e.from) || ids.includes(e.to)) state.edges.delete(eid);
      }
      redrawEdges();
      clearSelection();
      showToast('已刪除節點（含相關連線）');
    } else if (kind === 'edge'){
      state.edges.delete(id);
      redrawEdges();
      clearSelection();

    if (e.button !== 0) return;

    setProjectMenu(false);
    if (state.hoverEdge){
      selectEdgeForEdit(state.hoverEdge, e);
      return;
    }
    if (isEdgeUiTarget(e.target)) return;

    if (e.code === 'Space' || (e.buttons===1 && window.__spaceDown)){
      state.panning = { startX: e.clientX, startY: e.clientY, ox: state.view.x, oy: state.view.y };
      e.preventDefault();
      return;

    if (e.target === stage || e.target.classList.contains('grid')){
      state.pendingPort = null;
      state.draftEdge = null;
      state.marquee = {
        startClient: { x: e.clientX, y: e.clientY },
        currentClient: { x: e.clientX, y: e.clientY },
        startWorld: toWorld(e.clientX, e.clientY),
        currentWorld: toWorld(e.clientX, e.clientY),
        baseIds: (e.shiftKey || e.ctrlKey || e.metaKey) ? [...state.selectedNodeIds] : [],
        moved: false
      };
      if (!e.shiftKey && !e.ctrlKey && !e.metaKey) clearSelection();
      updateMarqueeBox();

  window.addEventListener('keydown', (e) => {

    if (state.connectorDrag){

      state.connectorDrag = null;

      saveState();
    }
  });

  window.addEventListener('mousemove', (e) => {
    // connector elbow editing
    if (updateConnectorDrag(e)){
      return;
    }

    // node dragging
    if (state.drag){
      const dx = (e.clientX - state.drag.startX) / state.view.scale;
      const dy = (e.clientY - state.drag.startY) / state.view.scale;
      updateMoveHint(e.clientX, e.clientY, Math.abs(e.clientX - state.drag.startX) > 3 || Math.abs(e.clientY - state.drag.startY) > 3);
      state.drag.origins.forEach(origin => {
        const n = state.nodes.get(origin.id);
        if (!n) return;
        n.x = origin.x + dx;
        n.y = origin.y + dy;
        refreshNodePosition(n.id);
      });
      state.drag.edgeOrigins.forEach(origin => {
        const edge = state.edges.get(origin.id);
        if (!edge) return;
        edge.elbow = { x: origin.x + dx, y: origin.y + dy };
      });
      redrawEdges();
      return;
    }

    // marquee selecting
    if (state.marquee){
      state.marquee.currentClient = { x: e.clientX, y: e.clientY };
      state.marquee.currentWorld = toWorld(e.clientX, e.clientY);
      const moveX = Math.abs(e.clientX - state.marquee.startClient.x);
      const moveY = Math.abs(e.clientY - state.marquee.startClient.y);
      state.marquee.moved = state.marquee.moved || moveX > 3 || moveY > 3;
      updateMarqueeBox();
      updateMarqueeSelection();
      return;
    }

    // node resizing
    if (state.resize){
      const n = state.nodes.get(state.resize.id);
      if (!n) return;
      const dx = (e.clientX - state.resize.startX) / state.view.scale;
      const dy = (e.clientY - state.resize.startY) / state.view.scale;
      n.w = Math.max(180, state.resize.startW + dx);
      n.h = Math.max(60, measureNodeContentHeight(n.id, n.w), state.resize.startH + dy);
      refreshNodePosition(n.id);
      redrawEdges();
      return;
    }

    // connecting preview
    if (state.draftEdge && state.draftEdge.mode === 'shift-drag'){
      const w = toWorld(e.clientX, e.clientY);
      state.draftEdge.x2 = w.x;
      state.draftEdge.y2 = w.y;
      redrawEdges();
      return;
    }

    // panning
    if (state.panning){
      const dx = e.clientX - state.panning.startX;
      const dy = e.clientY - state.panning.startY;
      state.view.x = state.panning.ox + dx;
      state.view.y = state.panning.oy + dy;
      setViewportTransform();
      return;
    }
  });

  window.addEventListener('mouseup', (e) => {
    // finish node drag/resize
    const changedLayout = Boolean(state.drag || state.resize);
    const wasMovingNodes = Boolean(state.drag);
    if (state.drag) state.drag = null;
    if (state.resize) state.resize = null;
    if (changedLayout) saveState();
    if (wasMovingNodes) hideMoveHint();

    const finishedMarquee = stopMarquee();
    if (finishedMarquee){
      window.__skipNextStageClick = true;
      setTimeout(() => { window.__skipNextStageClick = false; }, 0);
    }

    // finish connect
    if (state.draftEdge){
      // If mouseup on another node, connect
      const el = document.elementFromPoint(e.clientX, e.clientY);
      const nodeEl = el ? el.closest && el.closest('.node') : null;
      if (nodeEl){

    if (state.panning) state.panning = null;
  });

  // Zoom with Ctrl + wheel
  stage.addEventListener('wheel', (e) => {
    if (!e.ctrlKey) return; // keep normal scroll disabled anyway (stage is overflow hidden)
    e.preventDefault();

    const old = state.view.scale;
    const dir = e.deltaY > 0 ? -1 : 1;
    const next = Math.min(1.8, Math.max(0.55, old + dir * 0.08));

    // zoom around cursor
    const before = toWorld(e.clientX, e.clientY);
    state.view.scale = next;
    const after  = toWorld(e.clientX, e.clientY);

    state.view.x += (after.x - before.x) * next;
    state.view.y += (after.y - before.y) * next;

    setViewportTransform();
  }, { passive:false });

  // click empty space to cancel draft edge (if any)

  function escapeMermaidText(value){
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\r?\n/g, '<br/>');
  }

  function mermaidNodeId(id){
    return 'n_' + String(id || '').replace(/[^a-zA-Z0-9_]/g, '_');
  }

  function exportMermaid(){
    const lines = ['flowchart TD'];
    const classLines = [];
    const classDefs = new Map([
      ['CORE', 'fill:#fff8dc,stroke:#ead68f,color:#8a6510'],
      ['DOM', 'fill:#eef6ff,stroke:#b9d7f8,color:#1759b7'],
      ['API', 'fill:#f2fbf6,stroke:#a9dcc2,color:#27885c'],
      ['RISK', 'fill:#fff7f7,stroke:#efb5b5,color:#bf4a4a']
    ]);

    currentNodes().forEach(node => {
      const id = mermaidNodeId(node.id);
      const tags = (node.tags || []).join(', ');
      const tagLine = tags ? `<small>${escapeMermaidText(tags)}</small><br/>` : '';
      const body = node.body ? `<br/>${escapeMermaidText(node.body)}` : '';
      lines.push(`  ${id}["<b>${escapeMermaidText(node.title || 'Untitled')}</b><br/>${tagLine}${body}"]`);

      const primaryTag = (node.tags || []).find(tag => classDefs.has(String(tag).toUpperCase()));
      if (primaryTag) classLines.push(`  class ${id} ${String(primaryTag).toUpperCase()}`);
    });

    currentEdges().forEach(edge => {
      const from = state.nodes.has(edge.from) ? mermaidNodeId(edge.from) : null;
      const to = state.nodes.has(edge.to) ? mermaidNodeId(edge.to) : null;
      if (from && to) lines.push(`  ${from} --> ${to}`);
    });

    if (classLines.length){
      lines.push('');
      classDefs.forEach((style, name) => lines.push(`  classDef ${name} ${style}`));
      lines.push(...classLines);
    }
    return lines.join('\n');
  }

  function clearAll(){
    state.flows.clear();
    state.flows.set('main', { id: 'main', name: '主流程', parentFlowId: null, ownerNodeId: null });
    state.currentFlowId = 'main';
    state.nodes.clear();
    state.edges.clear();
    viewport.innerHTML = '';
    svg.querySelectorAll('path.edge').forEach(p => p.remove());
    svg.querySelectorAll('path.edge-hit, .edge-grip, .edge-end-grip, .edge-edit-guide, .edge-edit-halo').forEach(p => p.remove());
    clearSelection();
    redrawEdges();
  }

  function dedupeEdges(){
    const seen = new Map();
    for (const [edgeId, edge] of [...state.edges.entries()]){
      const key = `${edgeFlowId(edge)}:${edge.from}->${edge.to}`;
      const existingId = seen.get(key);
      if (!existingId){
        seen.set(key, edgeId);
        continue;
      }
      const existing = state.edges.get(existingId);
      if (existing && (!existing.fromPort || !existing.toPort) && (edge.fromPort || edge.toPort)){
        existing.fromPort = edge.fromPort || existing.fromPort;
        existing.toPort = edge.toPort || existing.toPort;
        existing.elbow = edge.elbow || existing.elbow;
      }
      state.edges.delete(edgeId);
    }
  }

  function importJSON(text, options = {}){
    let obj;
    try{
      obj = JSON.parse(text);
    }catch{
      showToast('JSON 解析失敗');
      return;
    }
    clearAll();
    state.flows.clear();
    const importedFlows = Array.isArray(obj.flows) && obj.flows.length
      ? obj.flows
      : [{ id: 'main', name: '主流程', parentFlowId: null, ownerNodeId: null }];
    importedFlows.forEach(flow => {
      if (!flow || !flow.id) return;
      state.flows.set(flow.id, {
        id: flow.id,
        name: flow.name || flow.id,
        parentFlowId: flow.parentFlowId || null,
        ownerNodeId: flow.ownerNodeId || null
      });
    });
    rootFlow();
    state.currentFlowId = state.flows.has(obj.currentFlowId) ? obj.currentFlowId : 'main';
    if (obj.view){
      state.view = { ...state.view, ...obj.view };
      setViewportTransform();
    }
    (obj.nodes || []).forEach(n => {
      n.flowId = n.flowId || 'main';
      state.nodes.set(n.id, n);
    });
    (obj.edges || []).forEach(e => {
      e.flowId = e.flowId || 'main';
      state.edges.set(e.id, e);
    });
    dedupeEdges();
    normalizeAllEdges();
    renderCurrentFlow();
    if (!options.skipSave) saveState();
    if (!options.quiet) showToast('已匯入並重建流程圖');
  }

  function buildImportPrompt(){
    const feature = promptFeatureInput.value.trim() || '請依目前需求判斷主要功能';
    return `請分析目前專案中「${feature}」相關的程式碼，逐個整理主要函數與其呼叫關係，輸出可直接匯入 flowchart 專案的 JSON。

重要規則：
1. 只輸出純 JSON，不要 Markdown，不要說明文字。
2. JSON 必須包含 project、projectName、version、currentFlowId、view、flows、nodes、edges。
3. version 固定為 2。
4. currentFlowId 固定為 "main"。
5. view 使用 { "x": 0, "y": 0, "scale": 1 }。
6. flows 至少要有 { "id": "main", "name": "主流程", "parentFlowId": null, "ownerNodeId": null }。

分析內容規則：
1. 只分析「${feature}」相關流程，不要展開無關功能。
2. 逐個說明各函數作用。
3. 如果函數內呼叫其他自定義函數，也要拆成子流程。
4. 子函數最多拆解到第 3 層。
5. 超過第 3 層的呼叫不要再建立子流程，可在 body 簡短概括。
6. 每個 body 最多 30 個中文字。
7. title 使用函數名稱，例如 "handleSubmit()"。
8. body 用繁體中文描述函數作用。
9. 不要放程式碼片段，只描述用途。
10. 優先分析專案自定義函數，不要展開標準函式庫、框架內建 API、DOM API、console、JSON、fetch 等。

節點格式：
每個 node 必須符合：
{
  "id": "唯一英文ID",
  "flowId": "所屬流程ID",
  "x": 數字,
  "y": 數字,
  "w": 260,
  "h": 100,
  "tags": ["CORE"],
  "title": "函數名稱()",
  "body": "30字內中文說明"
}

如果某函數有子函數，該 node 加上：
"subflowId": "flow_該節點ID"

並在 flows 新增：
{
  "id": "flow_該節點ID",
  "name": "函數名稱 子流程",
  "parentFlowId": "父流程ID",
  "ownerNodeId": "該節點ID"
}

連線格式：
每個 edge 必須符合：
{
  "id": "唯一英文ID",
  "flowId": "所屬流程ID",
  "from": "來源node id",
  "to": "目標node id"
}

版面配置規則：
1. 同一 flow 內節點由上到下排列。
2. x 可固定 80，y 從 100 開始，每個節點間隔 150。
3. 若同一層函數很多，可分欄排列，第二欄 x=420，第三欄 x=760。
4. edge 只連接同一 flowId 內的節點。
5. 呼叫順序明確時，用 edge 串起來。
6. 呼叫順序不明確時，只建立節點，不要亂連線。

tags 規則：
1. 核心邏輯用 ["CORE"]。
2. 前端 DOM、UI、事件處理用 ["DOM"]。
3. API、路由、HTTP、資料交換用 ["API"]。
4. 錯誤處理、風險、驗證、安全相關用 ["RISK"]。
5. 不確定時用 ["CORE"]。

id 命名規則：
1. 只能用英文字母、數字、底線。
2. 不要使用中文。
3. 若同名函數出現在不同層，後面加上層級或父函數，例如 parseData_in_handleSubmit。
4. edge id 可用 e_001、e_002 依序命名。

輸出 JSON 範例結構：

    }

  "edges": []
}

請現在開始分析並產生完整 JSON。`;

      body: 'loadWeek → merge allSchedules\n→ renderWeekFromMap → renderDayFromData'
    });

    const nWrite = addNode({
      x: 420, y: 510, w: 520, h: 132,
      tags: ['RISK'],
      title: '[WRITE FLOW]',
      body: 'create/drag/resize/edit/delete\n→ serialize payload → persistDay\n→ 後端存檔 → 回來重 render'
    });

    const nInteract = addNode({
      x: 60, y: 520, w: 320, h: 120,
      tags: ['CORE'],
      title: 'setupInteract(block)',
      body: 'interact.js\n拖曳 / 縮放 / 跨日\n（能力注入，不是狀態）'
    });

    // edges
    addEdge(nInput, nDOM, makePort('right', 46), makePort('left', 52));
    addEdge(nDOM, nState, makePort('right', 52), makePort('left', 52));
    addEdge(nState, nAPI, makePort('right', 52), makePort('left', 52));
    addEdge(nAPI, nRead, makePort('bottom', 140), makePort('right', 58));
    addEdge(nRead, nDOM, makePort('left', 58), makePort('bottom', 150));
    addEdge(nInput, nInteract, makePort('bottom', 140), makePort('top', 140));
    addEdge(nInteract, nWrite, makePort('right', 60), makePort('left', 66));
    addEdge(nWrite, nAPI, makePort('right', 260), makePort('bottom', 140));

    // position view
    state.view = { x: 0, y: 0, scale: 0.8 };
    setViewportTransform();
    showToast('已載入範例流程圖（可直接修改/新增/連線）');
  }

  // init
  loadLocalUsers();
  saveLocalUsers();
  updateAccountLabel();
  renderUserList();
  await loadProjects();
  syncProjectToolWidth();
  const savedState = await loadSavedState(currentProject.id);
  if (savedState){
    importJSON(savedState, { skipSave: true });
  } else {
    seed();
  }
  normalizeAllEdges();
  setViewportTransform();
  updateFlowNav();
  isBooting = false;
  scheduleToolbarLayout();
  saveState();

})();
</script>
</body>
</html>
